<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>微信机器人登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: #303133;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fa;
        }

        .login-card {
            width: 420px;
            max-width: 100%;
            padding: 36px 32px;
            text-align: center;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 10px 36px rgba(31, 35, 41, 0.09);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 25px;
        }

        .description,
        .tip {
            color: #606266;
        }

        .description {
            margin: 0 0 24px;
        }

        .qr-code-container {
            display: flex;
            width: 328px;
            max-width: 100%;
            min-height: 328px;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            padding: 4px;
            border: 1px solid #ebeef5;
            border-radius: 8px;
        }

        .qr-code {
            display: block;
            width: 320px;
            max-width: 100%;
            height: auto;
        }

        .tip {
            margin: 20px 0 0;
            font-size: 14px;
        }

        .error-message {
            display: none;
            color: #f56c6c;
            line-height: 1.7;
        }
    </style>
</head>
<body>
<main class="login-card">
    <h1>微信机器人登录</h1>
    <p class="description">请使用微信扫描下方二维码并确认登录</p>
    <div class="qr-code-container">
        <img id="qrCode" class="qr-code" src="/wechat/login/qrcode" alt="微信登录二维码">
        <p id="errorMessage" class="error-message">二维码加载失败，请确认服务正常运行后刷新页面。</p>
    </div>
    <p class="tip">二维码过期后，请刷新本页面重新获取。</p>
</main>
<script>
    const qrCode = document.getElementById('qrCode');
    const errorMessage = document.getElementById('errorMessage');

    qrCode.addEventListener('error', () => {
        qrCode.style.display = 'none';
        errorMessage.style.display = 'block';
    });
</script>
</body>
</html>
