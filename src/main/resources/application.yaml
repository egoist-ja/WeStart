spring:
  application:
    name: westart
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

websearch:
  api-key: ${UAPIS_API_KEY:}
  api-url: ${UAPI_SEARCH_API_URL:https://uapis.cn/api/v1/search/aggregate}

app:
  temp:
    images:
      dir: ./temp/images
